{% extends "admin/base_admin.html" %}
{% block nav_profile %}active{% endblock %}
{% block title %}个人资料{% endblock %}
{% block page_title %}个人资料{% endblock %}

{% block content %}
<form method="POST" class="admin-form">
  <div class="form-group">
    <label>用户名</label>
    <input type="text" value="{{ user.username }}" class="form-input" disabled>
    <span class="form-hint">用户名不可修改</span>
  </div>

  <div class="form-group">
    <label for="display_name">显示名称</label>
    <input type="text" id="display_name" name="display_name" value="{{ user.display_name or '' }}" class="form-input">
  </div>

  <div class="form-group">
    <label for="email">邮箱</label>
    <input type="email" id="email" name="email" value="{{ user.email or '' }}" class="form-input">
  </div>

  <div class="form-group">
    <label for="bio">个人简介</label>
    <textarea id="bio" name="bio" class="form-textarea" rows="4">{{ user.bio or '' }}</textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">保存</button>
  </div>
</form>
{% endblock %}
