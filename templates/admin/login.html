<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 远山</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">山</div>
      <h1>管理员登录</h1>
      <p>远山 · 博客管理系统</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
      {% for category, message in messages %}
      <div class="flash-message flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" class="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autofocus placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label for="captcha">验证码</label>
        <div class="captcha-wrap">
          <span class="captcha-text">{{ captcha_text }}</span>
          <input type="text" id="captcha" name="captcha" required placeholder="输入计算结果" class="form-input captcha-input" autocomplete="off">
        </div>
      </div>
      <button type="submit" class="login-btn">登 录</button>
    </form>

    <div class="login-footer">
      <a href="/">← 返回首页</a>
    </div>
  </div>
</body>
</html>
